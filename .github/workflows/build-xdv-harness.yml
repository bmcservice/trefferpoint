name: Build XDV Harness APK

on:
  push:
    branches: [ fue/xdv-harness ]
    paths:
      - 'reverse/xdvpro/harness/**'
      - '.github/workflows/build-xdv-harness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        working-directory: reverse/xdvpro/harness
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xdv-harness-debug-apk
          path: reverse/xdvpro/harness/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Build Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xdv-harness-build-reports
          path: reverse/xdvpro/harness/app/build/reports/
