name: Build XDV Harness APK

on:
  push:
    branches: [ fue/xdv-harness ]
    paths:
      - 'reverse/xdvpro/harness/**'
      - '.github/workflows/build-xdv-harness.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Keystore bereitstellen (einmalig generieren + committen)
        run: |
          KS=reverse/xdvpro/harness/app/xdvharness.keystore
          if [ ! -f "$KS" ]; then
            keytool -genkey -v -keystore "$KS" -alias xdvh \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass xdvh12345 -keypass xdvh12345 \
              -dname "CN=XDVH, O=bmcservice, C=DE"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add "$KS"
            git commit -m "build: fester XDVH-Keystore (stabile APK-Signatur)"
            git push
          fi

      - name: Build Debug APK
        working-directory: reverse/xdvpro/harness
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xdv-harness-debug-apk
          path: reverse/xdvpro/harness/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Build Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xdv-harness-build-reports
          path: reverse/xdvpro/harness/app/build/reports/
