name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'index.html'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write   # damit der Workflow den Keystore commit-pushen darf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Keystore bereitstellen (einmalig generieren + committen)
        id: keystore
        run: |
          KEYSTORE=android/app/trefferpoint.keystore
          if [ ! -f "$KEYSTORE" ]; then
            echo "Kein Keystore gefunden — generiere neuen und committe."
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -alias trefferpoint \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass trefferpoint123 -keypass trefferpoint123 \
              -dname "CN=TrefferPoint, O=bmcservice, C=DE"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add "$KEYSTORE"
            git commit -m "build: festen Signing-Keystore generieren (APK-Updates ohne Deinstall möglich)"
            git push
            echo "generated=true" >> $GITHUB_OUTPUT
          else
            echo "Keystore bereits vorhanden."
            echo "generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync TrefferPoint web assets
        run: |
          mkdir -p android/app/src/main/assets/trefferpoint
          cp index.html android/app/src/main/assets/trefferpoint/index.html
          cp manifest.json android/app/src/main/assets/trefferpoint/manifest.json
          cp sw.js android/app/src/main/assets/trefferpoint/sw.js
          cp version.json android/app/src/main/assets/trefferpoint/version.json

      - name: Build signed Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrefferPoint-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Build Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android/app/build/reports/
            android/build/reports/
